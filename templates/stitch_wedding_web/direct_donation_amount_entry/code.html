<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Presente em Dinheiro - Wedding Registry</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#cfa117",
              "background-light": "#f8f7f6",
              "background-dark": "#211d11",
              "olive-muted": "#887f63",
            },
            fontFamily: {
              "display": ["Plus Jakarta Sans", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-[#181611] dark:text-white transition-colors duration-300">
<div class="relative flex min-h-screen flex-col overflow-x-hidden">
<!-- Navigation -->
<header class="flex items-center justify-between border-b border-solid border-[#e5e3dc] dark:border-white/10 px-6 py-4 lg:px-40 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md sticky top-0 z-50">
<div class="flex items-center gap-3">
<div class="flex h-8 w-8 items-center justify-center rounded-lg bg-primary text-white">
<span class="material-symbols-outlined text-xl">favorite</span>
</div>
<h2 class="text-lg font-bold tracking-tight">Nosso Casamento</h2>
</div>
<nav class="hidden md:flex items-center gap-8">
<a class="text-sm font-medium hover:text-primary transition-colors" href="#">Lista de Presentes</a>
<a class="text-sm font-medium hover:text-primary transition-colors" href="#">Nossa História</a>
<a class="text-sm font-medium hover:text-primary transition-colors" href="#">Informações</a>
</nav>
<div class="flex items-center gap-4">
<div class="h-10 w-10 rounded-full border-2 border-primary/20 bg-cover bg-center" data-alt="Profile picture of the happy couple" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDtdC-tHy22KCk8LC-NoEqCieN9pUsUrZaBzKvYfWohhZkLhQbEsTlFaVq2vAQQyONjffyNvJ8S8dOO-3mMLM1it4FZxWrTZpq9zcIWgJ3sVnhWomPyzawtJ9Simu8JbLWquuPvFijKTvVdk0oKTiURXhW7av8I0ztLci9nukGlXPowvuAtyMpiFir6vDP1N7NudwjF2bM1W5zexbi7o3-dbnnSgXoouTbgF81jIYbdb-tYi3TC_tsJ2QwJ9atNYULxo25VZinGPsEx')"></div>
</div>
</header>
<main class="flex-1 flex justify-center py-10 px-4 sm:px-6">
<div class="max-w-[640px] w-full flex flex-col gap-8">
<!-- Hero Title -->
<div class="text-center space-y-2">
<h1 class="text-4xl font-extrabold tracking-tight text-[#181611] dark:text-white">Presente em Dinheiro</h1>
<p class="text-olive-muted dark:text-olive-muted/80 text-lg">Contribua com a nossa jornada de forma direta e segura.</p>
</div>
<!-- Donation Card -->
<div class="bg-white dark:bg-zinc-900 rounded-xl shadow-xl shadow-black/5 p-6 md:p-10 border border-[#e5e3dc] dark:border-white/5">
<!-- Quick Amount Selection -->
<div class="mb-8">
<p class="text-base font-semibold mb-4 text-[#181611] dark:text-gray-200">Selecione um valor</p>
<div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="donation-amount" type="radio" value="50"/>
<div class="flex h-14 items-center justify-center rounded-lg border-2 border-[#e5e3dc] dark:border-white/10 peer-checked:border-primary peer-checked:bg-primary/5 transition-all duration-200">
<span class="font-bold text-olive-muted dark:text-gray-400 peer-checked:text-primary">R$ 50</span>
</div>
</label>
<label class="relative cursor-pointer group">
<input checked="" class="peer sr-only" name="donation-amount" type="radio" value="100"/>
<div class="flex h-14 items-center justify-center rounded-lg border-2 border-[#e5e3dc] dark:border-white/10 peer-checked:border-primary peer-checked:bg-primary/5 transition-all duration-200">
<span class="font-bold text-olive-muted dark:text-gray-400 peer-checked:text-primary">R$ 100</span>
</div>
</label>
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="donation-amount" type="radio" value="200"/>
<div class="flex h-14 items-center justify-center rounded-lg border-2 border-[#e5e3dc] dark:border-white/10 peer-checked:border-primary peer-checked:bg-primary/5 transition-all duration-200">
<span class="font-bold text-olive-muted dark:text-gray-400 peer-checked:text-primary">R$ 200</span>
</div>
</label>
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="donation-amount" type="radio" value="500"/>
<div class="flex h-14 items-center justify-center rounded-lg border-2 border-[#e5e3dc] dark:border-white/10 peer-checked:border-primary peer-checked:bg-primary/5 transition-all duration-200">
<span class="font-bold text-olive-muted dark:text-gray-400 peer-checked:text-primary">R$ 500</span>
</div>
</label>
</div>
</div>
<!-- Custom Amount -->
<div class="mb-8">
<label class="block text-base font-semibold mb-3">Ou digite outro valor</label>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-olive-muted font-bold text-lg">R$</span>
<input class="w-full pl-12 pr-4 h-14 rounded-lg border border-[#e5e3dc] dark:border-white/10 dark:bg-background-dark focus:ring-2 focus:ring-primary focus:border-primary transition-all text-lg font-semibold" placeholder="0,00" type="number"/>
</div>
</div>
<div class="h-px bg-[#e5e3dc] dark:bg-white/10 w-full mb-8"></div>
<!-- Guest Details -->
<div class="space-y-6">
<div>
<div class="flex justify-between items-center mb-2">
<label class="text-base font-semibold">Seu Nome</label>
<span class="text-xs text-olive-muted italic">Opcional</span>
</div>
<input class="w-full h-14 px-4 rounded-lg border border-[#e5e3dc] dark:border-white/10 dark:bg-background-dark focus:ring-2 focus:ring-primary focus:border-primary transition-all" placeholder="Como quer ser identificado?" type="text"/>
</div>
<!-- Anonymous Toggle -->
<div class="flex items-center justify-between p-4 rounded-lg bg-background-light dark:bg-white/5">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-olive-muted">visibility_off</span>
<span class="text-sm font-medium">Doar anonimamente</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
<div>
<label class="block text-base font-semibold mb-2">Mensagem para os noivos</label>
<textarea class="w-full p-4 rounded-lg border border-[#e5e3dc] dark:border-white/10 dark:bg-background-dark focus:ring-2 focus:ring-primary focus:border-primary transition-all resize-none" placeholder="Deixe uma mensagem especial..." rows="3"></textarea>
</div>
</div>
<!-- Submit Button -->
<div class="mt-10">
<button class="w-full bg-primary hover:bg-primary/90 text-white h-14 rounded-lg font-bold text-lg flex items-center justify-center gap-2 shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
                        Continuar para pagamento
                        <span class="material-symbols-outlined">arrow_forward</span>
</button>
<div class="flex items-center justify-center gap-2 mt-6 text-olive-muted text-sm">
<span class="material-symbols-outlined text-[18px]">lock</span>
                        Pagamento seguro processado por AsaAs
                    </div>
</div>
</div>
<!-- Footer Small -->
<div class="flex flex-wrap justify-center gap-6 text-xs text-olive-muted uppercase tracking-widest font-semibold pb-10">
<a class="hover:text-primary" href="#">Termos de Uso</a>
<a class="hover:text-primary" href="#">Privacidade</a>
<a class="hover:text-primary" href="#">Ajuda</a>
</div>
</div>
</main>
</div>
</body></html>
